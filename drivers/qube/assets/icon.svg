<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 960">
  <g fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main unit body - slightly angled from right side for depth -->
    <!-- Front face -->
    <rect x="140" y="180" width="520" height="580" rx="24" ry="24" stroke-width="18"/>
    <!-- Right side face (3D depth) -->
    <path d="M660,180 L780,120 L780,700 L660,760" stroke-width="18"/>
    <!-- Top face -->
    <path d="M140,180 L260,120 L780,120 L660,180" stroke-width="18"/>

    <!-- Large fan / ventilation grille on front face -->
    <circle cx="400" cy="410" r="160" stroke-width="16"/>
    <circle cx="400" cy="410" r="120" stroke-width="12"/>
    <circle cx="400" cy="410" r="30" stroke-width="14"/>
    <!-- Fan blades -->
    <path d="M400,380 Q440,410 400,440" stroke-width="10"/>
    <path d="M430,410 Q400,450 370,410" stroke-width="10"/>
    <path d="M400,440 Q360,410 400,380" stroke-width="10"/>
    <path d="M370,410 Q400,370 430,410" stroke-width="10"/>

    <!-- Horizontal grille lines on front -->
    <line x1="200" y1="620" x2="600" y2="620" stroke-width="10"/>
    <line x1="200" y1="660" x2="600" y2="660" stroke-width="10"/>
    <line x1="200" y1="700" x2="600" y2="700" stroke-width="10"/>

    <!-- Control panel / display area -->
    <rect x="490" y="600" width="110" height="50" rx="8" ry="8" stroke-width="10"/>
    <!-- LED indicator dots -->
    <circle cx="510" cy="625" r="6" stroke-width="6"/>
    <circle cx="540" cy="625" r="6" stroke-width="6"/>
    <circle cx="570" cy="625" r="6" stroke-width="6"/>

    <!-- Bottom pipe connections -->
    <!-- Left pipe (supply) -->
    <path d="M280,760 L280,860" stroke-width="20"/>
    <ellipse cx="280" cy="860" rx="24" ry="10" stroke-width="10"/>
    <!-- Right pipe (return) -->
    <path d="M500,760 L500,860" stroke-width="20"/>
    <ellipse cx="500" cy="860" rx="24" ry="10" stroke-width="10"/>

    <!-- Refrigerant lines on right side -->
    <path d="M780,350 Q820,350 820,400 Q820,450 780,450" stroke-width="12"/>
    <path d="M780,500 Q830,500 830,550 Q830,600 780,600" stroke-width="12"/>

    <!-- Mounting feet -->
    <rect x="180" y="760" width="60" height="30" rx="6" ry="6" stroke-width="10"/>
    <rect x="560" y="760" width="60" height="30" rx="6" ry="6" stroke-width="10"/>

    <!-- Brand line / label area on front -->
    <line x1="260" y1="240" x2="540" y2="240" stroke-width="8"/>
  </g>
</svg>
